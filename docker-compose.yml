# docker-compose.yml
# Runs PostgreSQL and Redis locally for development
version: "3.8"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: aiguard_postgres
    environment:
      POSTGRES_USER: aiguard
      POSTGRES_PASSWORD: aiguard_dev_password
      POSTGRES_DB: aiguard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run RLS setup script on first boot
      - ./scripts/init_rls.sql:/docker-entrypoint-initdb.d/init_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiguard -d aiguard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery task queue
  redis:
    image: redis:7-alpine
    container_name: aiguard_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: